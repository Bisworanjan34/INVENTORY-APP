{% extends 'base.html' %}
{% block body %}
<div class="p-2 md:p-6 max-w-2xl mx-auto">
    <div class="card p-4 md:p-6 shadow-sm border-0 rounded-2xl">
        <h2 class="text-xl font-bold mb-4 text-primary">Review & Finalize</h2>

        <form method="POST" action="{% url 'inventory:confirm_update' %}" id="billForm">
            {% csrf_token %}

            <!-- Mobile Optimized Items List -->
            <div id="itemContainer" class="space-y-3">
                {% for item in results %}
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 relative">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2">
                            <label class="text-[10px] uppercase font-bold text-gray-500">Product</label>
                            <input type="text" name="name_{{ forloop.counter0 }}" class="form-control form-control-sm"
                                value="{{ item.name }}" required>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500">Qty</label>
                            <input type="number" name="qty_{{ forloop.counter0 }}" class="form-control form-control-sm"
                                value="{{ item.qty }}" required>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500">Price</label>
                            <input type="number" step="0.01" name="price_{{ forloop.counter0 }}"
                                class="form-control form-control-sm" value="{{ item.price }}" required>
                        </div>
                    </div>
                    <button type="button" class="mt-2 w-full text-[10px] text-red-600 font-bold underline"
                        onclick="openDeleteModal(this)">
                        Remove Item
                    </button>
                    <input type="hidden" name="action_{{ forloop.counter0 }}" value="{{ item.action }}">
                </div>
                {% endfor %}
            </div>

            <button type="button" class="btn btn-outline-secondary btn-sm w-full mt-4 py-2" onclick="addRow()">+ Add New
                Item</button>

            <div class="mt-4 p-3 bg-primary bg-opacity-10 rounded-lg">
                <label class="text-[10px] md:text-xs font-bold text-primary mb-1">Final Total (₹)</label>
                <!-- Mobile par thoda chhota input, laptop par standard -->
                <input type="number" step="0.01" name="final_total"
                    class="form-control form-control-sm md:form-control-lg text-center font-bold"
                    value="{{ bill.total_amount|default:0 }}" required>
            </div>

            
            <button type="submit"
                class="w-full bg-green-600 text-white text-xs md:text-sm py-2.5 md:py-3 rounded-xl font-bold mt-4 hover:bg-green-700 transition">
                Finalize Update
            </button>
            <a href="{% url 'core:home'%}"
                class=" btn w-full bg-orange-600 text-white text-xs md:text-sm py-2.5 md:py-3 rounded-xl font-bold mt-4 hover:bg-orange-700 transition">
                Back
            </a>
        </form>
    </div>
</div>

<!-- Modal -->
<div id="deleteModal"
    class="hidden fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white p-6 rounded-2xl w-full max-w-[300px] text-center">
        <h3 class="text-lg font-bold">Remove Item?</h3>
        <div class="mt-6 flex gap-2">
            <button onclick="closeModal()" class="flex-1 py-2 bg-gray-200 rounded-lg font-bold text-sm">Back</button>
            <button id="confirmDeleteBtn"
                class="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold text-sm">Yes</button>
        </div>
    </div>
</div>

<script>
    let rowToDelete = null;
    function openDeleteModal(btn) {
        rowToDelete = btn.closest('.bg-gray-50');
        document.getElementById('deleteModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('deleteModal').classList.add('hidden'); }

    document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
        if (rowToDelete) { rowToDelete.remove(); closeModal(); }
    });

    let rowCount = {{ results| length }};
    function addRow() {
        let container = document.querySelector("#itemContainer");
        let row = `<div class="bg-gray-50 p-3 rounded-lg border border-gray-200 mt-2">
            <div class="grid grid-cols-2 gap-2">
                <div class="col-span-2"><label class="text-[10px] uppercase font-bold text-gray-500">Product</label><input type="text" name="name_${rowCount}" class="form-control form-control-sm" placeholder="Name" required></div>
                <div><label class="text-[10px] uppercase font-bold text-gray-500">Qty</label><input type="number" name="qty_${rowCount}" class="form-control form-control-sm" value="1" required></div>
                <div><label class="text-[10px] uppercase font-bold text-gray-500">Price</label><input type="number" step="0.01" name="price_${rowCount}" class="form-control form-control-sm" value="0.00" required></div>
            </div>
            <button type="button" class="mt-2 w-full text-[10px] text-red-600 font-bold underline" onclick="openDeleteModal(this)">Remove Item</button>
            <input type="hidden" name="action_${rowCount}" value="create">
        </div>`;
        container.insertAdjacentHTML('beforeend', row);
        rowCount++;
    }
</script>
{% endblock %}
