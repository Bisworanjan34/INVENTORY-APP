{% extends 'base.html' %}
{% block body %}
<div class="p-2 md:p-6 max-w-2xl mx-auto">
    <div class="bg-black/60 border border-green-500/50 p-6 shadow-[0_0_20px_rgba(0,255,65,0.1)]">
        <h2 class="text-xl font-black text-green-500 uppercase tracking-widest mb-6 border-b border-green-900 pb-2">Review & Finalize</h2>

        <form method="POST" action="{% url 'inventory:confirm_update' %}" id="billForm">
            {% csrf_token %}

            <div id="itemContainer" class="space-y-4">
                {% for item in results %}
                <div class="bg-green-900/10 p-4 border border-green-800/50 relative">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="text-[9px] uppercase font-bold text-green-600">Product</label>
                            <input type="text" name="name_{{ forloop.counter0 }}" class="w-full bg-black border border-green-700 p-2 text-white text-sm" value="{{ item.name }}" required>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase font-bold text-green-600">Qty</label>
                            <input type="number" name="qty_{{ forloop.counter0 }}" class="w-full bg-black border border-green-700 p-2 text-white text-sm" value="{{ item.qty }}" required>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase font-bold text-green-600">Price</label>
                            <input type="number" step="0.01" name="price_{{ forloop.counter0 }}" class="w-full bg-black border border-green-700 p-2 text-white text-sm" value="{{ item.price }}" required>
                        </div>
                    </div>
                    <button type="button" class="mt-3 w-full text-[10px] text-red-500 font-bold uppercase tracking-widest hover:text-red-300" onclick="openDeleteModal(this)">
                        [ Remove Item ]
                    </button>
                    <input type="hidden" name="action_{{ forloop.counter0 }}" value="{{ item.action }}">
                </div>
                {% endfor %}
            </div>

            <button type="button" class="w-full mt-4 py-3 border border-green-500 text-green-500 font-bold uppercase text-xs hover:bg-green-500 hover:text-black transition" onclick="addRow()">
                + Add New Item
            </button>

            <div class="mt-6 p-4 bg-green-900/20 border border-green-700 text-center">
                <label class="text-[10px] font-bold text-green-500 uppercase tracking-widest block mb-1">Final Total (₹)</label>
                <input type="number" step="0.01" name="final_total" class="w-full bg-transparent text-center text-2xl font-black text-white focus:outline-none" value="{{ bill.total_amount|default:0 }}" required>
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-black font-black uppercase py-4 mt-6 hover:bg-green-400 transition tracking-widest">
                Finalize Update
            </button>
            <a href="{% url 'core:home'%}" class="block text-center w-full bg-transparent border border-gray-600 text-gray-400 font-bold uppercase py-4 mt-3 hover:border-gray-400 hover:text-white transition tracking-widest">
                Back
            </a>
        </form>
    </div>
</div>

<div id="deleteModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-black border border-red-600 p-8 w-full max-w-[300px] text-center">
        <h3 class="text-white font-bold uppercase">Remove Item?</h3>
        <div class="mt-8 flex gap-4">
            <button onclick="closeModal()" class="flex-1 py-2 border border-gray-600 text-gray-400 font-bold text-xs uppercase">No</button>
            <button id="confirmDeleteBtn" class="flex-1 py-2 bg-red-600 text-white font-bold text-xs uppercase">Yes</button>
        </div>
    </div>
</div>

<script>
    let rowToDelete = null;
    function openDeleteModal(btn) {
        rowToDelete = btn.closest('.bg-green-900/10');
        document.getElementById('deleteModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('deleteModal').classList.add('hidden'); }
    document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
        if (rowToDelete) { rowToDelete.remove(); closeModal(); }
    });
    let rowCount = {{ results|length }};
    function addRow() {
        let container = document.querySelector("#itemContainer");
        let row = `<div class="bg-green-900/10 p-4 border border-green-800/50 mt-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2"><label class="text-[9px] uppercase font-bold text-green-600">Product</label><input type="text" name="name_${rowCount}" class="w-full bg-black border border-green-700 p-2 text-white text-sm" placeholder="Product Name" required></div>
                <div><label class="text-[9px] uppercase font-bold text-green-600">Qty</label><input type="number" name="qty_${rowCount}" class="w-full bg-black border border-green-700 p-2 text-white text-sm" value="1" required></div>
                <div><label class="text-[9px] uppercase font-bold text-green-600">Price</label><input type="number" step="0.01" name="price_${rowCount}" class="w-full bg-black border border-green-700 p-2 text-white text-sm" value="0.00" required></div>
            </div>
            <button type="button" class="mt-3 w-full text-[10px] text-red-500 font-bold uppercase tracking-widest" onclick="openDeleteModal(this)">[ Remove Item ]</button>
            <input type="hidden" name="action_${rowCount}" value="create">
        </div>`;
        container.insertAdjacentHTML('beforeend', row);
        rowCount++;
    }
</script>
{% endblock %}
