{% extends 'base.html' %}
{% block body %}

<!-- Cyber Green Circular Loading Overlay -->
<div id="loading-overlay"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0, 0, 0, 0.95); z-index:9999; backdrop-filter: blur(15px); flex-direction:column; justify-content:center; align-items:center;">
    
    <div class="circular-progress" id="circular-progress">
        <span class="progress-value" id="progress-value">0%</span>
    </div>
    <h6 class="mt-4 text-green-500 font-mono tracking-widest uppercase animate-pulse">Analyzing Data...</h6>
</div>

<div class="min-h-screen bg-black/90 p-4 md:p-8">
    <div class="max-w-md mx-auto">
        
        <a href="{% url 'core:home' %}" class="inline-flex items-center text-green-500 hover:text-green-300 mb-6 font-mono text-sm uppercase">
            <i class="bi bi-arrow-left me-2"></i> Dashboard
        </a>

        <!-- Main Card -->
        <div class="bg-black/60 border border-green-900 rounded-3xl p-6 md:p-8 shadow-[0_0_20px_rgba(0,255,65,0.1)]">
            <div class="text-center mb-8">
                <!-- Scanning Related PNG Icon -->
                <div class="mb-4">
                    <img src="https://cdn-icons-png.flaticon.com/512/3203/3203756.png" 
                         alt="Scanning" 
                         class="mx-auto w-20 h-20 opacity-90" 
                         style="filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(86deg) brightness(118%) contrast(119%);">
                </div>
                <h4 class="text-2xl font-black text-white uppercase tracking-tighter">Scan New Bill</h4>
                <p class="text-green-500/60 font-mono text-[10px] mt-1 uppercase">Upload document for AI extraction</p>
            </div>

            <form method="post" action="{% url 'inventory:upload_page' %}" enctype="multipart/form-data" id="scanForm">
                {% csrf_token %}
                <div class="mb-6">
                    <label class="block text-green-500 font-mono text-[10px] uppercase mb-3">Select Bill Image</label>
                    <div class="relative group">
                        <input type="file" name="bill_image" id="id_bill_image" class="hidden" onchange="updateFileName(this)">
                        <label for="id_bill_image" class="flex items-center justify-between w-full p-4 bg-black border border-green-700 hover:border-green-400 cursor-pointer rounded-xl transition-all">
                            <span id="file-chosen" class="text-gray-400 font-mono text-xs">No file chosen</span>
                            <span class="bg-green-900/30 text-green-500 px-3 py-1 text-[10px] uppercase font-bold border border-green-500">Browse</span>
                        </label>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="w-full py-4 bg-green-500 hover:bg-green-400 text-black font-black uppercase tracking-widest text-sm rounded-xl transition-all">
                    Process & Scan
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    /* Circular Liquid Progress */
    .circular-progress {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(closest-side, black 80%, transparent 0 99%, black 0),
                    conic-gradient(#22c55e 0deg, #1a3a2a 0deg);
        transition: background 0.3s;
    }
    .progress-value { font-size: 24px; font-weight: bold; color: #22c55e; }
</style>

<script>
    function updateFileName(input) {
        document.getElementById('file-chosen').textContent = input.files[0] ? input.files[0].name : 'No file chosen';
    }

    document.getElementById('scanForm').addEventListener('submit', function () {
        document.getElementById('loading-overlay').style.display = 'flex';
        let progress = 0;
        const circle = document.getElementById('circular-progress');
        const value = document.getElementById('progress-value');
        
        let interval = setInterval(function() {
            progress += 1;
            value.textContent = progress + '%';
            circle.style.background = `radial-gradient(closest-side, black 80%, transparent 0 99%, black 0), conic-gradient(#22c55e ${progress * 3.6}deg, #1a3a2a 0deg)`;
            if (progress >= 100) clearInterval(interval);
        }, 50);
    });
</script>
{% endblock %}
