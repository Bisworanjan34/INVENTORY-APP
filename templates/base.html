<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Fonts for Professional Look -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2921/2921226.png">
    
    <title>{% block title %}Inventory Pro{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }

        input, select, textarea {
            display: block; width: 100%; padding: 0.6rem;
            border: 1px solid #cbd5e1; border-radius: 0.5rem;
        }
        /* PREMIUM MARQUEE SECTION */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: #00000011;
            padding: 20px 0;
            position: relative;
            border-bottom: 2px solid transparent;
            background-image: linear-gradient(#00000013, #0000001a), linear-gradient(90deg, #ff007f, #7928ca, #0070f3);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .marquee-text {
            display: flex;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .marquee-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 50px;
            font-size: 1.1rem;
            background: linear-gradient(90deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 768px) {
            .marquee-container { padding: 12px 0; }
            .marquee-item { font-size: 0.65rem; padding: 0 25px; }
        }
    </style>
</head>

<body>
    {% include 'core/navbar.html' %}
    {% if messages %}
<div class="fixed top-20 right-4 z-[100] w-full max-w-sm md:max-w-md px-4">
    {% for message in messages %}
    <div id="message-{{ forloop.counter }}" 
         class="relative flex items-center justify-between bg-white/90 backdrop-blur-md border-l-4 border-blue-500 shadow-xl p-4 rounded-lg mb-3 animate-slide-in">
        <div class="flex items-center gap-3">
            <span class="text-blue-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </span>
            <p class="text-sm font-semibold text-gray-800">{{ message }}</p>
        </div>
        <button onclick="document.getElementById('message-{{ forloop.counter }}').remove()" 
                class="text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
    <div class="container mt-4">
        {% block body %}{% endblock %}
    </div>

    {% include 'core/footer.html' %}
</body>
</html>
