<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
      <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2921/2921226.png">
    
    <title>{% block title %}Lipu Systems | Inventory{% endblock %}</title>

    <style>
        /* Cyber-Matrix Fix */
        body { 
            margin: 0;
            padding: 0;
            background-color: #0000001e !important;
            /* Yahan ek professional high-tech grid image hai */
            background-image: url('https://static.vecteezy.com/system/resources/previews/001/340/091/large_2x/green-cyber-circuit-future-technology-concept-background-vector.jpg') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
            background-blend-mode: overlay !important;
            font-family: 'JetBrains Mono', monospace !important;
        }

        /* Essential: Dark Overlay to kill the 'ghatia' light image look */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.26) !important; /* Ye opacity control karti hai */
            background-attachment: fixed;
            z-index: -1;
        }

        /* Neon Glow Utility */
        .cyber-glow {
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.8);
            color: #00ff41;
        }

        /* Input Fields: Cyber Style */
        input, select, textarea {
            background: rgba(0, 10, 0, 0.8) !important; 
            border: 1px solid #00ff41 !important; 
            color: #00ff41 !important;
            border-radius: 0 !important;
            padding: 0.75rem !important;
        }

        /* PREMIUM CYBER MARQUEE */
        .marquee-container {
            width: 100%; overflow: hidden; 
            background: rgba(0, 5, 0, 0.203);
            border-top: 1px solid #00ff41; 
            border-bottom: 1px solid #00ff41;
            padding: 12px 0;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .marquee-text {
            display: flex; white-space: nowrap;
            animation: marquee 30s linear infinite;
            font-weight: 900; text-transform: uppercase;
            color: #00ff41; letter-spacing: 4px;
        }

        .marquee-item { padding: 0 60px; font-size: 1rem; }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Custom Alert Styling */
        .cyber-alert {
            background: rgba(0, 5, 0, 0.9) !important; 
            border: 1px solid #00ff41 !important;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3) !important;
        }
        .cyber-alert-wrapper {
        position: fixed;
        top: 80px;
        right: 15px;
        z-index: 100;
        width: calc(100% - 30px);
        max-width: 350px;
    }

    /* Message Card */
    .cyber-alert {
        background: rgba(0, 10, 0, 0.9);
        border-left: 4px solid #00ff41;
        border-right: 1px solid #003300;
        border-top: 1px solid #003300;
        border-bottom: 1px solid #003300;
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    </style>
</head>

<body>
    {% include 'core/navbar.html' %}

  {% if messages %}
<div class="cyber-alert-wrapper">
    {% for message in messages %}
    <div id="message-{{ forloop.counter }}" class="cyber-alert p-4 mb-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <!-- Icon -->
            <span class="text-green-500 font-black">◈</span>
            <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest leading-tight">
                {{ message }}
            </p>
        </div>
        
        <button onclick="document.getElementById('message-{{ forloop.counter }}').style.display='none'" 
                class="text-green-700 hover:text-green-400 transition ml-2">
            <span class="text-lg">×</span>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
    <main class="container mx-auto px-4 py-8">
        {% block body %}{% endblock %}
    </main>

    {% include 'core/footer.html' %}
</body>
</html>
