<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-dark-tech { background: #0f172a; }
        .text-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        @keyframes pulse-scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line { animation: pulse-scan 3s linear infinite; }
    </style>
</head>
<body class="bg-dark-tech h-screen flex items-center justify-center text-white overflow-hidden font-sans p-4">

    <div class="absolute inset-0 pointer-events-none opacity-10">
        <div class="scan-line h-1 bg-blue-500 w-full shadow-[0_0_20px_#3b82f6]"></div>
    </div>

    <div class="text-center z-10 w-full max-w-lg">
        <h1 class="text-[80px] md:text-[160px] font-black text-blue-600/20 text-glow leading-none">404</h1>
        
        <h2 class="text-xl md:text-3xl font-bold mt-2">PAGE NOT FOUND</h2>
        
        <p class="mt-4 text-gray-400 text-sm md:text-base leading-relaxed px-4">
            Warehouse mein ye item list nahi mil rahi hai. Shayaad link galat hai ya file delete ho gayi hai.
        </p>
        
        <div class="mt-8 flex flex-col gap-3">
            <a href="/" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded font-bold transition-all text-sm uppercase tracking-widest shadow-[0_0_15px_rgba(37,99,235,0.3)]">
                Back to Dashboard
            </a>
            <a href="mailto:support@lipu.com" class="w-full py-3 border border-gray-700 hover:border-gray-500 rounded font-bold transition-all text-sm uppercase tracking-widest">
                Report Error
            </a>
        </div>
    </div>

</body>
</html>
