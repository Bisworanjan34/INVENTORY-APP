<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIPU | SYSTEMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #0a1a0a 0%, #000000 100%); 
            color: #00ff41; 
            font-family: 'JetBrains Mono', monospace; 
        }
        
        .glass-panel {
            background: rgba(0, 20, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.05);
        }

        .cyber-text { text-shadow: 0 0 8px #00ff41; }
        
        .btn-mini {
            padding: 6px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #00ff41;
            transition: all 0.3s;
        }
        .btn-mini:hover { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }

        /* Scanning effect */
        .scan-line { height: 1px; background: rgba(0, 255, 65, 0.3); animation: scan 3s linear infinite; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0"><div class="scan-line"></div></div>

    <!-- Main Card -->
    <div class="glass-panel w-full max-w-sm p-6 relative z-10">
        
        <!-- Status Header -->
        <div class="flex justify-between items-center mb-6 border-b border-green-900 pb-2">
            <span class="text-[9px] uppercase tracking-widest">System_ID: #103778910</span>
            <div class="flex gap-1">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
            </div>
        </div>

        <!-- Title -->
        <h1 class="text-2xl font-black uppercase tracking-tighter mb-1 text-white">Lipu_Systems</h1>
        <p class="text-[10px] text-green-600 mb-8 uppercase tracking-widest">Secure // Inventory // Access</p>

        <!-- Dynamic Content -->
        <div class="space-y-4 mb-8">
            <div class="bg-black p-3 border border-green-900">
                <p class="text-[10px] text-green-400">DATA_SYNC: <span class="text-white">COMPLETED</span></p>
                <div class="w-full h-1 bg-green-900 mt-2"><div class="w-full h-full bg-green-500"></div></div>
            </div>
        </div>

        <!-- Mini Buttons -->
        <div class="flex gap-2">
            <a  href="{%url 'core:home'%}"
            class="btn-mini flex-1 bg-green-900/20">Dashboard</a>
            <button class="btn-mini flex-1 bg-green-900/20">Settings</button>
        </div>

    </div>
</body>
</html>
