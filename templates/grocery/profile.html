{% extends 'base.html' %}
{% block title %}PROFILE_CONSOLE{% endblock %}

{% block body %}
<div class="max-w-xs mx-auto p-4 animate-in fade-in duration-500 bg-black/50">
    <h2 class="text-white font-black uppercase text-sm mb-6 border-l-2 border-green-500 pl-3">Edit_Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <!-- Professional Clickable Profile Photo -->
        <div class="flex flex-col items-center">
            <label for="photo-upload" class="relative cursor-pointer group">
                <div class="w-24 h-24 border-2 border-green-500/20 rounded-full overflow-hidden shadow-[0_0_20px_rgba(34,197,94,0.15)] group-hover:border-green-500 transition-all duration-300">
                    {% if profile.photo %}
                        <img src="{{ profile.photo.url }}" class="w-full h-full object-cover">
                    {% else %}
                        <div class="w-full h-full bg-[#0a0a0a] flex items-center justify-center text-green-500 font-black">◈</div>
                    {% endif %}
                </div>
                <!-- Camera Overlay Icon -->
                <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="text-white text-[10px] font-bold uppercase">Edit</span>
                </div>
            </label>
            <input type="file" name="photo" id="photo-upload" class="hidden" accept="image/*">
            <p class="text-[8px] text-gray-400 mt-2 uppercase tracking-widest">Tap circle to change</p>
        </div>

        <!-- Details -->
        <div class="space-y-4">
            <div>
                <label class="text-[8px] text-green-600 uppercase font-bold tracking-widest ml-1">Display Name</label>
                <input type="text" name="name" value="{{ profile.name|default:'' }}" 
                       class="w-full bg-[#050505] border border-white/5 p-3 text-white text-[11px] focus:border-green-500 outline-none transition rounded-sm">
            </div>

            <div>
                <label class="text-[8px] text-green-600 uppercase font-bold tracking-widest ml-1">Bio / Status</label>
                <textarea name="bio" 
                          class="w-full bg-[#050505] border border-white/5 p-3 text-white text-[11px] h-20 focus:border-green-500 outline-none transition rounded-sm resize-none">{{ profile.bio|default:'' }}</textarea>
            </div>
        </div>

        <button type="submit" class="w-full py-3 bg-green-600 text-black font-black uppercase text-[10px] tracking-widest hover:bg-green-500 active:scale-95 transition-all duration-300 shadow-[0_0_15px_rgba(22,163,74,0.2)]">
            Save_Changes
        </button>
    </form>
</div>
{% endblock %}
