{% extends 'base.html' %}
{% block body %}
<div class="max-w-md mx-auto p-6 bg-[#050505]/60 min-h-screen text-white flex flex-col items-center justify-center">
    
    <!-- Header -->
    <div class="w-full mb-8 text-center border-b border-green-900/50 pb-4">
        <h2 class="text-[10px] font-black uppercase tracking-widest text-green-500">Secure Payment Gateway</h2>
        <h1 class="text-2xl font-black mt-2 text-green-400">₹{{ grand_total }}</h1>
        <p class="text-[9px] text-green-900 font-bold uppercase mt-1">Transaction Status: <span class="text-green-500 animate-pulse">Pending</span></p>
    </div>

    <!-- QR Container with Glow -->
    <div class="relative group mb-8">
    <div class="absolute -inset-1 bg-gradient-to-r from-green-600 to-green-900 rounded-lg blur opacity-25 group-hover:opacity-75 transition duration-1000"></div>
        <!-- Container with dark background, cyber border, and green neon glow -->
<div class="relative bg-green-800/80 p-4 rounded-xl border-2 border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.4)] inline-block">
    
    <!-- Neon Green QR Code (color=00FF66 is pure neon/cyber green) -->
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=00FF66&bgcolor=000000&data=upi://pay%3Fpa=biswo2@ybl%26pn=Jagannath_Verity_Store%26am={{ grand_total }}%26cu=INR%26tn=Order_Payment" 
         alt="Scan to Pay" class="w-40 h-40">
    
</div>
</div>

    <p class="text-[9px] text-gray-400 mb-8 uppercase tracking-tighter">Scan with any UPI App (GPay, PhonePe, Paytm)</p>

    <!-- Buttons Section -->
    <div class="w-full space-y-4">
        <a href="upi://pay?pa=biswo2@ybl&pn=Jagannath_Verity_Store&am={{ grand_total }}&cu=INR&tn=Order_Payment" 
           class="w-full py-4 border border-green-600 text-white text-[10px] font-black uppercase tracking-widest hover:bg-green-800/80 hover:text-white transition-all duration-300 block text-center">
           Pay via UPI App
        </a>

        <form method="POST" action="{% url 'grocery:confirm_upi_payment' %}">
            {% csrf_token %}
            <button type="submit" class="w-full bg-green-600 text-black font-black uppercase text-[10px] p-4 hover:bg-green-800/80 hover:text-white active:scale-95 transition-all duration-200 shadow-[0_0_15px_rgba(21,128,61,0.5)]">
                I have paid, Confirm Order
            </button>
        </form>
    </div>

    <div class="mt-8 text-[8px] text-green-500 uppercase">
        Encrypted & Secure | Transaction ID: {{ payment.id|default:"AUTOGEN" }}
    </div>
</div>
{% endblock %}
