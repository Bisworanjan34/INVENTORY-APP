{% extends 'base.html' %}
{% block body %}
<div class="max-w-md mx-auto p-6 bg-[#050505]/50 min-h-screen text-white flex flex-col justify-center">
    
    <!-- Professional Header with Payment Icon and Perfect Spacing -->
    <div class="mb-6 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 mb-3 bg-green-500/10 border border-green-500/30 rounded-2xl shadow-[0_0_15px_rgba(34,197,94,0.15)] text-green-400">
            <i class="fas fa-wallet text-xl"></i>
        </div>
        <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Checkout</h2>
        <h1 class="text-base font-black mt-1 text-green-400 tracking-wider">Payment Method</h1>
    </div>

    <form method="POST" action="{% url 'grocery:process_order' %}" class="space-y-4">
        {% csrf_token %}

        <!-- COD Option -->
        <label class="relative flex items-center p-4 bg-black border border-white/10 cursor-pointer transition-all duration-300 hover:border-green-500/30 has-[:checked]:border-green-500 has-[:checked]:shadow-[0_0_15px_rgba(21,128,61,0.2)]">
            <input type="radio" name="pay_method" value="COD" checked class="peer sr-only">
            <!-- Icon -->
            <div class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-lg mr-4 peer-checked:bg-green-500/20 peer-checked:text-green-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <div class="flex flex-col">
                <span class="text-[12px] font-black uppercase">Cash On Delivery</span>
                <span class="text-[9px] text-gray-500">Pay at your doorstep</span>
            </div>
            <div class="ml-auto w-3 h-3 rounded-full border border-gray-600 peer-checked:bg-green-500 peer-checked:border-green-500"></div>
        </label>

        <!-- ONLINE Option -->
        <label class="relative flex items-center p-4 bg-black border border-white/10 cursor-pointer transition-all duration-300 hover:border-green-500/30 has-[:checked]:border-green-500 has-[:checked]:shadow-[0_0_15px_rgba(21,128,61,0.2)]">
            <input type="radio" name="pay_method" value="ONLINE" class="peer sr-only">
            <!-- Icon -->
            <div class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-lg mr-4 peer-checked:bg-green-500/20 peer-checked:text-green-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            </div>
            <div class="flex flex-col">
                <span class="text-[12px] font-black uppercase">Online Payment</span>
                <span class="text-[9px] text-gray-500">UPI, Cards & Netbanking</span>
            </div>
            <div class="ml-auto w-3 h-3 rounded-full border border-gray-600 peer-checked:bg-green-500 peer-checked:border-green-500"></div>
        </label>

        <button type="submit" 
                class="w-full mt-8 bg-green-600 text-black font-black uppercase text-[11px] p-4 tracking-widest hover:bg-green-800/80 hover:text-white active:scale-95 transition-all shadow-[0_0_15px_rgba(21,128,61,0.4)]">
            Confirm Order
        </button>
    </form>
</div>
{% endblock %}
