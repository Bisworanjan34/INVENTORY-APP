{% extends 'base.html' %}
{% block body %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <h2 class="text-2xl font-bold mb-4">Reset Password</h2>
    <p class="text-gray-600 mb-6">Enter your email and we'll send you instructions.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" name="email"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            {% if form.email.errors %}
            <p class="text-red-500 text-xs mt-1">{{ form.email.errors.0 }}</p>
            {% endif %}
        </div>
        <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">
            Send Reset Email
        </button>
    </form>
</div>
{% endblock %}
