{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-black p-4">
    <div class="max-w-sm w-full bg-black/60 p-8 border border-green-500/50 shadow-[0_0_20px_rgba(0,255,65,0.1)]">
        
        <h2 class="text-2xl font-black text-green-500 uppercase tracking-widest mb-4">Reset Password</h2>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-8">Access recovery protocol.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-6">
                <label class="block text-[9px] font-bold text-green-600 uppercase mb-2">Email Address</label>
                <input type="email" name="email"
                    class="w-full bg-black border border-green-800 text-white p-3 focus:border-green-500 outline-none transition text-[10px]" 
                    required placeholder="ENTER YOUR SYSTEM EMAIL">
                
                {% if form.email.errors %}
                <p class="text-red-500 text-[9px] mt-2 uppercase">{{ form.email.errors.0 }}</p>
                {% endif %}
            </div>

            <button type="submit"
                class="w-full bg-green-600 text-black py-3 font-black uppercase tracking-widest hover:bg-green-400 transition">
                Send Reset Link
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'core:login' %}" class="text-[10px] text-green-400 hover:text-green-500 uppercase tracking-widest underline">
                Back to Login
            </a>
        </div>
    </div>
</div>

<style>
    /* Global input override for this page */
    input::placeholder {
        color: #004d1f;
        font-size: 10px;
    }
</style>
{% endblock %}
