{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-black p-4">
    <div class="max-w-sm w-full bg-black/60 p-8 border border-green-500 shadow-[0_0_20px_rgba(0,255,65,0.2)] text-center">
        
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 border-2 border-green-500 rounded-full flex items-center justify-center">
                <span class="text-green-500 text-2xl font-black">!</span>
            </div>
        </div>

        <h2 class="text-xl font-black text-green-500 uppercase tracking-widest mb-4">Email Dispatched</h2>
        <p class="text-[11px] text-green-600 uppercase tracking-widest mb-8">
            Reset instructions have been routed to your registered email address.
        </p>

        <a href="{% url 'core:login' %}" 
            class="block w-full border border-green-500 text-green-500 py-3 font-bold uppercase tracking-widest hover:bg-green-500 hover:text-black transition">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
