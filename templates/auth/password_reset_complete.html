{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-black p-4">
    <div class="max-w-sm w-full bg-black/60 p-8 border border-green-500 shadow-[0_0_20px_rgba(0,255,65,0.2)] text-center">
        
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 border-2 border-green-500 rounded-full flex items-center justify-center animate-pulse">
                <span class="text-green-500 text-3xl">✓</span>
            </div>
        </div>

        <h2 class="text-xl font-black text-green-500 uppercase tracking-widest mb-4">Password Updated</h2>
        <p class="text-[11px] text-green-700 uppercase tracking-widest mb-8">
            Access credentials have been synchronized. You may now proceed to login.
        </p>

        <a href="{% url 'core:login' %}" 
            class="block w-full bg-green-600 text-black py-3 font-black uppercase tracking-widest hover:bg-green-400 transition">
            Proceed to Login
        </a>
    </div>
</div>
{% endblock %}
