{% extends 'base.html' %}
{% block body %}
<!-- Padding mobile ke liye kam, laptop ke liye zyada -->
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-6 px-4">
    <!-- max-w-sm mobile ke liye, md:max-w-md laptop ke liye -->
    <div
        class="max-w-sm md:max-w-md w-full space-y-6 bg-white p-6 md:p-10 rounded-2xl shadow-xl border border-gray-100">

        <div class="text-center">
            <h2 class="text-2xl md:text-3xl font-extrabold text-gray-900">Create Account</h2>
            <p class="mt-1 text-xs md:text-sm text-gray-600">Join our team by creating an account</p>
        </div>

        <form class="space-y-4" method="POST">
            {% csrf_token %}

            <div class="space-y-3">
                {% for field in form %}
                <div>
                    <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-500 text-[10px] mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <div>
                <button type="submit"
                    class="w-full flex justify-center py-2.5 md:py-3 border border-transparent text-xs md:text-sm font-bold rounded-lg text-white bg-green-600 hover:bg-green-700 transition shadow-md">
                    Register Now
                </button>
            </div>
        </form>

        <div class="text-center text-[11px] md:text-sm text-gray-600">
            <p>
                Already have an account?
                <a href="{% url 'core:login' %}" class="font-bold text-blue-600 hover:underline">Sign in here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
