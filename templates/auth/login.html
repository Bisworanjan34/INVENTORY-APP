{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-black/55 py-6 px-4">
    <div class="max-w-[340px] md:max-w-md w-full space-y-6 bg-gray-900/40 backdrop-blur-xl p-6 md:p-10 rounded-3xl border border-green-600 shadow-[0_0_40px_rgba(34,197,94,0.15)] animate-fade-in ">

        <div class="text-center">
            <h2 class="text-2xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 ">Welcome Back</h2>
            <p class="mt-1 text-[10px] md:text-sm text-gray-400 uppercase tracking-widest">System Access Portal</p>
        </div>

        <form class="space-y-4" method="POST">
            {% csrf_token %}

            <div class="space-y-3">
                {% for field in form %}
                <div>
                    <label class="block text-[9px] md:text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-400 text-[9px] mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <button type="submit"
                class="w-full flex justify-center py-2.5 md:py-3 border-none text-[11px] md:text-sm font-black text-green-500 bg-green/50  hover:text-white transition-all duration-300 rounded-xl shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:shadow-[0_0_30px_rgba(34,197,94,0.6)] active:scale-95 uppercase tracking-wider">
                ACCESS SYSTEM
            </button>
        </form>

        <div class="text-center text-[10px] md:text-sm text-gray-500">
            <p>
                <a href="{% url 'core:password_reset' %}" class="text-gray-400 hover:text-green-400 transition-colors underline underline-offset-4">Forgot password?</a>
            </p>
            
            <p class="mt-2">
                <span class="text-gray-500">New User? </span>
                <a href="{% url 'core:register' %}" class="font-bold text-green-500 hover:text-green-400 transition-colors">Register</a>
            </p>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    
    /* Mobile-optimized Input */
    input {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: white !important;
        border-radius: 10px !important;
        padding: 10px 12px !important;
        font-size: 13px !important;
        width: 100% !important;
        transition: all 0.3s !important;
    }
    input:focus {
        border-color: #22c55e !important;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.2) !important;
        outline: none !important;
    }
</style>
{% endblock %}
