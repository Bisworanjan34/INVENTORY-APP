{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-6 px-4">
    <!-- max-w-sm mobile ke liye, md:max-w-md laptop ke liye -->
    <div
        class="max-w-sm md:max-w-md w-full space-y-6 bg-white p-6 md:p-10 rounded-2xl shadow-xl border border-gray-100">

        <div class="text-center">
            <h2 class="text-2xl md:text-3xl font-extrabold text-gray-900">Welcome Back</h2>
            <p class="mt-1 text-xs md:text-sm text-gray-600">Please sign in to your account</p>
        </div>

        <form class="space-y-4" method="POST">
            {% csrf_token %}

            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                    <!-- Input size mobile ke liye thoda chhota -->
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-500 text-[10px] mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <button type="submit"
                class="w-full flex justify-center py-2.5 md:py-3 border border-transparent text-xs md:text-sm font-bold rounded-lg text-white bg-blue-600 hover:bg-blue-700 transition shadow-md">
                Sign In
            </button>
        </form>

        <div class="text-center text-[11px] md:text-sm text-gray-600">
            <p>
                <a href="{% url 'core:password_reset' %}" class="font-medium text-blue-600 hover:underline">Forgot
                    password?</a>
            </p>
            <p class="mt-2">
                Don't have an account?
                <a href="{% url 'core:register' %}" class="font-bold text-blue-600 hover:underline">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
