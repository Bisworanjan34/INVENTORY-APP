{% extends 'base.html' %}
{% block body %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <h2 class="text-2xl font-bold mb-4">Set New Password</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
            class="w-full bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 transition">
            Set New Password
        </button>
    </form>
</div>
{% endblock %}
