{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-black p-4">
    <div class="max-w-sm w-full bg-black/60 p-8 border border-green-500 shadow-[0_0_20px_rgba(0,255,65,0.2)]">
        
        <h2 class="text-xl font-black text-green-500 uppercase tracking-widest mb-6">Set New Credentials</h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="text-green-400 text-xs">
                {{ form.as_p }}
            </div>

            <button type="submit"
                class="w-full mt-4 bg-green-600 text-black py-3 font-black uppercase tracking-widest hover:bg-green-400 transition">
                Authorize New Password
            </button>
        </form>
    </div>
</div>

<style>
    /* Django form fields ko Cyber look dene ke liye */
    form p {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 15px;
        font-size: 10px;
        text-transform: uppercase;
        font-weight: bold;
    }
    form input {
        background: black !important;
        border: 1px solid #004d1f !important;
        color: white !important;
        padding: 10px !important;
        width: 100%;
    }
    form input:focus {
        border-color: #00ff41 !important;
        outline: none;
    }
    /* Error messages ke liye */
    .errorlist {
        color: #ff4141;
        list-style: none;
        margin-top: 5px;
    }
</style>
{% endblock %}
