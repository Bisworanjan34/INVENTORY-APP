<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_FAILURE | 500</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700;900&display=swap');
        
        body { background: #000000; color: #ff3333; font-family: 'JetBrains Mono', monospace; }
        
        .error-panel {
            background: rgba(20, 0, 0, 0.8);
            border: 1px solid #ff3333;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-text { animation: glitch 0.5s infinite; }
        
        .btn-retry {
            border: 1px solid #ff3333;
            color: #ff3333;
            transition: 0.3s;
        }
        .btn-retry:hover { background: #ff3333; color: #000; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- Error Container -->
    <div class="error-panel w-full max-w-sm p-8 text-center relative">
        
        <!-- Error Code -->
        <div class="glitch-text text-7xl md:text-9xl font-black text-red-600 mb-4">500</div>
        
        <h1 class="text-xl md:text-2xl font-black text-white uppercase tracking-widest">System Overload</h1>
        
        <p class="mt-4 text-[10px] text-red-400 uppercase tracking-widest leading-relaxed">
            CRITICAL FAILURE: Server engine has encountered an internal glitch. The Lipu Systems core is currently offline.
        </p>

        <!-- Buttons -->
        <div class="mt-8 flex flex-col gap-3">
            <a href="/" class="w-full py-3 bg-red-600 text-white font-black uppercase tracking-widest text-xs hover:bg-red-500 transition">
                Return to Base
            </a>
            <button onclick="location.reload()" class="btn-retry w-full py-3 font-bold uppercase tracking-widest text-xs transition">
                Retry Connection
            </button>
        </div>

        <!-- Footer ID -->
        <div class="mt-8 text-[8px] text-red-900 uppercase">Err_Code: Backend_HALT_005</div>
    </div>

</body>
</html>
