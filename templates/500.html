<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error-gradient { background: linear-gradient(135deg, #0f172a 0%, #312e81 100%); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="error-gradient h-screen flex items-center justify-center text-white p-4">
    <div class="text-center w-full max-w-sm">
        <!-- 500 ka size mobile ke liye thoda chhota kiya -->
        <div class="text-7xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-purple-500 float">500</div>
        
        <h1 class="text-2xl md:text-4xl font-bold mt-2">System Overload!</h1>
        
        <p class="mt-3 text-xs md:text-sm text-gray-300 px-4">
            Hamare server ke engine mein chhota sa glitch aa gaya hai. Hamari team ise turant fix kar rahi hai.
        </p>
        
        <!-- Buttons mobile par vertical ya compact gap mein -->
        <div class="mt-6 flex flex-col sm:flex-row justify-center gap-3">
            <a href="/" class="px-5 py-2.5 bg-white text-indigo-900 font-bold rounded-lg shadow-lg hover:scale-105 transition text-sm">
                Dashboard
            </a>
            <button onclick="location.reload()" class="px-5 py-2.5 border border-white rounded-lg hover:bg-white hover:text-indigo-900 transition text-sm">
                Retry Now
            </button>
        </div>
    </div>
</body>
</html>
