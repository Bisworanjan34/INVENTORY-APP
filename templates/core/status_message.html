{% if messages %}
<!-- Mobile-Optimized Alert Container -->
<div class="fixed top-16 left-0 w-full px-3 z-[100] pointer-events-none md:left-auto md:right-4 md:w-80">
    {% for message in messages %}
    <div id="msg-{{ forloop.counter }}" 
         class="pointer-events-auto bg-[#050505]/95 backdrop-blur-md border-l-4 p-3 mb-2 flex items-center justify-between shadow-2xl transition-all duration-500
         {% if 'error' in message.tags %}border-red-600{% else %}border-green-500{% endif %}">
        
        <div class="flex items-center gap-3 overflow-hidden">
            <span class="{% if 'error' in message.tags %}text-red-500{% else %}text-green-500{% endif %} font-black text-xs">◈</span>
            <p class="text-[9px] {% if 'error' in message.tags %}text-red-400{% else %}text-green-400{% endif %} font-bold uppercase tracking-widest truncate">
                {{ message }}
            </p>
        </div>
        
        <button onclick="document.getElementById('msg-{{ forloop.counter }}').remove()" 
                class="text-gray-500 hover:text-white transition ml-3">×</button>
    </div>
    {% endfor %}
</div>
{% endif %}
