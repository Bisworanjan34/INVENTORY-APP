<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

<nav class="sticky top-0 z-50 w-full border-b border-white/20 bg-white/80 backdrop-blur-md shadow-sm transition-all duration-500 hover:shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">

            <!-- Logo Section -->
            <a href="{% url 'core:home' %}" class="flex items-center group shrink-0 transition-transform duration-300 hover:scale-[1.02]">
                <span class="text-3xl font-[900] tracking-tighter text-blue-600 group-hover:text-orange-500 transition-colors duration-300" style="font-family: 'Outfit', sans-serif;">
                    Lipu
                </span>
                <span class="text-[10px] sm:text-xs font-bold tracking-[0.2em] text-orange-400 uppercase ml-2 pt-1">
                    Inventory
                </span>
            </a>

            <!-- User Action Section -->
            <div class="flex items-center gap-3 sm:gap-6">
                {% if user.is_authenticated %}
                <span class="hidden sm:inline-block text-sm font-medium text-gray-600">
                    Hi, <span class="text-blue-600 font-bold">{{ user.username }}</span>
                </span>

                <a href="{% url 'core:logout' %}"
                    class="relative inline-flex items-center justify-center rounded-full bg-red-600 px-5 py-2 text-sm font-bold text-white transition-all duration-300 hover:bg-gray-800 hover:shadow-lg hover:shadow-red-500/30 active:scale-95 border border-transparent hover:border-red-400 overflow-hidden group">
                    <span class="relative z-10">Logout</span>
                </a>
                {% else %}
                <a href="{% url 'core:login' %}"
                    class="relative inline-flex items-center justify-center rounded-full bg-blue-600 px-5 py-2 text-sm font-bold text-white transition-all duration-300 hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/30 active:scale-95">
                    Login
                </a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>

<style>
    /* Smooth entrance animation */
    nav {
        animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
