<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<nav class="sticky top-0 z-50 w-full border-b border-green-900 bg-green-900/0 backdrop-blur-md transition-all duration-500">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">

            <!-- Logo Section with Cyber Icon -->
            <a href="{% url 'core:home' %}" class="flex items-center group transition-transform duration-300 hover:scale-[1.02]">
                <!-- Attractive Cyber Icon -->
                <div class="w-10 h-10 mr-3 bg-green-500/10 border border-green-500 flex items-center justify-center rounded-lg shadow-[0_0_15px_rgba(0,255,65,0.2)]">
                    <span class="text-green-500 font-black text-xl">AI</span>
                </div>
                
                <div class="flex flex-col">
                    <span class="text-3xl font-[900] tracking-tighter text-white group-hover:text-green-400 transition-colors duration-300" style="font-family: 'Outfit', sans-serif;">
                        Lipu
                    </span>
                    <span class="text-[9px] font-bold tracking-[0.2em] text-green-400 uppercase">
                        Inventory
                    </span>
                </div>
            </a>
            <!-- User Action Section -->
            <div class="flex items-center gap-3 sm:gap-6">
                {% if user.is_authenticated %}
                <span class="hidden sm:inline-block text-sm font-mono text-gray-400">
                    Hi, <span class="text-green-400 font-bold">{{ user.username }}</span>
                </span>

                <a href="{% url 'core:logout' %}"
                    class="relative inline-flex items-center justify-center rounded-none bg-transparent px-6 py-2 text-sm font-bold text-red-500 border border-red-500 transition-all duration-300 hover:bg-red-900 hover:text-white hover:shadow-[0_0_15px_rgba(220,38,38,0.3)] active:scale-95 uppercase tracking-widest">
                    Logout
                </a>
                {% else %}
                <a href="{% url 'core:login' %}"
                    class="relative inline-flex items-center justify-center rounded-none bg-green/70 px-6 py-2 text-sm font-bold text-green-500 border border-green-600 transition-all duration-300 hover:bg-green-700 hover:text-white  hover:shadow-[0_0_20px_rgba(34,197,94,0.4)] active:scale-95 uppercase tracking-widest">
                    Login
                </a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>

<style>
    /* Smooth entrance animation */
    nav {
        animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
